kind = "web"
previewPath = "/"
title = "تطبيق تسجيل الدخول"
version = "1.0.0"
id = "artifacts/login-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26006

[services.development]
run = "pnpm --filter @workspace/login-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/login-app", "run", "build" ]
publicDir = "artifacts/login-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26006"
BASE_PATH = "/"
